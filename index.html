<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Translation Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="card">
  <h2>🌍 Language Translator</h2>

  <textarea id="inputText" placeholder="Type text here..."></textarea>

  <div class="row">
    <select id="source">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="mr">Marathi</option>
    </select>

    <select id="target">
      <option value="hi">Hindi</option>
      <option value="en">English</option>
      <option value="mr">Marathi</option>
    </select>
  </div>

  <button class="primary" onclick="translateText()">Translate</button>

  <textarea id="outputText" placeholder="Translated text..." readonly></textarea>

  <button class="secondary" onclick="speakText()">🔊 Speak</button>
</div>

<!-- Background Wave Animation (same as SkillBridge) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta/dist/vanta.waves.min.js"></script>

<script src="/script.js"></script>

</body>
</html>
